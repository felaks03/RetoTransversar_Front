<section class="registro-page">
  <div class="registro-card">
    <h1>Crear cuenta</h1>
    <p class="subtitle">Regístrate para gestionar tus reservas y acceder a los eventos activos.</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="username">Usuario</label>
        <input id="username" formControlName="username" autocomplete="username" maxlength="45" />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" autocomplete="new-password" maxlength="100" />
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" autocomplete="email" maxlength="100" />
      </div>

      <div class="field">
        <label for="nombre">Nombre</label>
        <input id="nombre" formControlName="nombre" autocomplete="given-name" maxlength="30" />
      </div>

      <div class="field">
        <label for="apellidos">Apellidos</label>
        <input id="apellidos" formControlName="apellidos" autocomplete="family-name" maxlength="45" />
      </div>

      <div class="field">
        <label for="direccion">Dirección</label>
        <input id="direccion" formControlName="direccion" autocomplete="street-address" maxlength="100" />
      </div>

      <button type="submit" class="btn-primary" [disabled]="form.invalid || submitting">
        {{ submitting ? 'Creando cuenta…' : 'Crear cuenta' }}
      </button>
    </form>

    <p class="auth-switch">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>.</p>
  </div>
</section>
