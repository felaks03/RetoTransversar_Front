<section class="admin-page">
  <div class="page-header">
    <h1>Gestión de tipos</h1>
    <button class="btn-primary" (click)="openNew()">+ Nuevo tipo</button>
  </div>

  <table class="admin-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      @for (tipo of tipos; track tipo.idTipo) {
        <tr>
          <td>{{ tipo.idTipo }}</td>
          <td>{{ tipo.nombre }}</td>
          <td>{{ tipo.descripcion }}</td>
          <td class="actions">
            <button class="btn-sm" (click)="openEdit(tipo)">Editar</button>
            <button class="btn-sm btn-sm-danger" (click)="confirmDelete(tipo)">Eliminar</button>
          </td>
        </tr>
      }
    </tbody>
  </table>

  @if (showForm) {
    <div class="overlay" (click)="showForm = false">
      <div class="modal" (click)="$event.stopPropagation()">
        <h2>{{ editing ? 'Editar tipo' : 'Nuevo tipo' }}</h2>
        <form [formGroup]="form" (ngSubmit)="save()">
          <div class="field">
            <label>Nombre</label>
            <input formControlName="nombre" />
          </div>
          <div class="field">
            <label>Descripción</label>
            <input formControlName="descripcion" />
          </div>
          <div class="modal-actions">
            <button type="button" class="btn-secondary" (click)="showForm = false">Cancelar</button>
            <button type="submit" class="btn-primary" [disabled]="form.invalid">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  }

  @if (deleteTarget) {
    <app-confirm-dialog
      title="Eliminar tipo"
      [message]="'¿Eliminar el tipo «' + deleteTarget.nombre + '»?'"
      (confirmed)="doDelete()"
      (cancelled)="deleteTarget = null" />
  }
</section>
