<section class="login-page">
  <div class="login-card">
    <h1>Iniciar sesión</h1>
    <p class="subtitle">Introduce tu usuario y contraseña para acceder.</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="username">Usuario</label>
        <input id="username" formControlName="username" placeholder="username" autocomplete="username" />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" placeholder="Contraseña" autocomplete="current-password" />
      </div>

      <button type="submit" class="btn-primary" [disabled]="form.invalid || submitting">
        {{ submitting ? 'Entrando…' : 'Entrar' }}
      </button>
    </form>
  </div>
</section>
