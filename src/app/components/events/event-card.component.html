<article class="event-card" [routerLink]="['/eventos', evento.idEvento]">
  @if (esDestacado) {
    <span class="event-card__featured">&#9733; Destacado</span>
  }
  <div class="event-card__body">
    <h3 class="event-card__title">{{ evento.nombre }}</h3>
    <p class="event-card__type">{{ tipoNombre$ | async }}</p>
    <p class="event-card__date">{{ evento.fechaInicio | date:'d MMM yyyy' }}</p>
    <p class="event-card__location">{{ evento.direccion }}</p>
    <div class="event-card__footer">
      <app-price-tag [precio]="evento.precio" />
      <app-estado-badge [estado]="evento.estado" />
    </div>
  </div>
</article>
